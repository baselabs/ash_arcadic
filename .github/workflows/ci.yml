name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (elixir ${{ matrix.elixir }} / otp ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Supported floor (mix.exs requires elixir ~> 1.15).
          - elixir: "1.16.3"
            otp: "26.2"
          # Current — dialyzer runs on this one only.
          - elixir: "1.18.3"
            otp: "27.3"
            dialyzer: true

    services:
      arcadedb:
        # Matches the locally-verified image (reports 26.8.1). Pin to a stable
        # ArcadeDB tag once one is standardized for the project.
        image: arcadedata/arcadedb:latest
        ports:
          - 2480:2480
        env:
          JAVA_OPTS: >-
            -Darcadedb.server.rootPassword=arcadedb_dev_password
            -Darcadedb.server.mode=development

    env:
      MIX_ENV: test
      ARCADIC_TEST_URL: http://localhost:2480
      ARCADIC_TEST_PASSWORD: arcadedb_dev_password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict

      - name: Wait for ArcadeDB to be ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -u root:arcadedb_dev_password http://localhost:2480/api/v1/ready || true)
            if [ "$code" = "204" ]; then echo "ArcadeDB ready"; exit 0; fi
            echo "waiting for ArcadeDB ($i)... last=$code"; sleep 2
          done
          echo "ArcadeDB did not become ready in time" >&2
          exit 1

      - name: Test (unit + integration)
        run: mix test --include integration

      - name: Cache PLT
        if: matrix.dialyzer
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Dialyzer
        if: matrix.dialyzer
        run: mix dialyzer

  # Regression guard for the optional-dep contract: a non-CDC host must compile ash_arcadic
  # WITHOUT `replicant`. The AshArcadic.Replicant.{Apply,Sink.Impl,Pipeline} subtree is
  # compile-gated on Code.ensure_loaded?(Replicant.Sink); everything else is replicant-free.
  # Compile-only (no ArcadeDB service needed).
  compile-without-cdc:
    name: Compile without optional replicant (non-CDC host)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.3"
          otp-version: "27.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile the replicant-free subtree (optional replicant dep dropped)
        run: |
          # This CI checkout is disposable, so dropping the dep in place is safe. Assert the
          # dep line was actually removed (non-vacuity) so a mix.exs reformat can't turn this
          # guard into a silent pass.
          before=$(md5sum mix.exs | cut -d' ' -f1)
          sed -i '/{:replicant,/d' mix.exs
          after=$(md5sum mix.exs | cut -d' ' -f1)
          if [ "$before" = "$after" ]; then
            echo "::error::guard vacuous — the {:replicant, ...} dep line was not found in mix.exs; update this guard" >&2
            exit 1
          fi
          # The {:replicant, ...} dep is a single line today. If it were ever reformatted to a
          # multi-line tuple, the line-delete above would strip only a fragment and break mix.exs
          # syntax — which must NOT be confused with the gated-compile property failing. Fail with
          # a distinct message so a future reformat is fixed at the guard, not misread as a real bug.
          elixir -e 'Code.string_to_quoted!(File.read!("mix.exs"))' \
            || { echo "::error::guard broke mix.exs syntax (multi-line {:replicant, ...} tuple?) — harden the dep removal" >&2; exit 1; }
          mix deps.unlock replicant
          mix compile --force --warnings-as-errors
